<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Навушники X1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="product-page">

    <div class="product-gallery">
        <img id="mainImage" src="images/headphones-x1.jpg" alt="Навушники X1">

        <div class="thumbnail-container">
            <img src="images/headphones-x1.jpg" onclick="changeImage(this)">
            <img src="images/headphones-x1-2.jpg" onclick="changeImage(this)">
            <img src="images/headphones-x1-3.jpg" onclick="changeImage(this)">
        </div>
    </div>

    <div class="product-info">
        <h1>Навушники X1</h1>
        <p class="price">1200 грн</p>

        <p class="description">
            Якісні бездротові навушники з чистим звучанням,
            шумозаглушенням та автономністю до 20 годин.
        </p>

        <button class="buy-btn">Купити</button>
    </div>

</section>

<script>
function changeImage(element) {
    document.getElementById("mainImage").src = element.src;
}
</script>

</body>
</html>
